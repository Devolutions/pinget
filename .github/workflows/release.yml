name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Package version to validate during manual runs.
        required: true
        type: string
      publish_nuget:
        description: Publish packages to NuGet.org during a manual run.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Compute package version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION='${{ inputs.version }}'
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Tag version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  rust-artifacts:
    name: Rust Artifacts (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: pinget-windows-x64.zip
            binary_path: rust/target/release/pinget.exe
          - os: ubuntu-latest
            asset_name: pinget-linux-x64.zip
            binary_path: rust/target/release/pinget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust on Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Setup Rust on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: cargo build -p pinget-cli --manifest-path rust/Cargo.toml --release

      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          Compress-Archive -LiteralPath '${{ matrix.binary_path }}' -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Archive Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          zip -j "dist/${{ matrix.asset_name }}" "${{ matrix.binary_path }}"

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  csharp-packages:
    name: C# Packages
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Restore solution
        run: dotnet restore dotnet/Devolutions.Pinget.slnx

      - name: Build solution
        run: dotnet build dotnet/Devolutions.Pinget.slnx -c Release --no-restore

      - name: Run core tests
        run: dotnet test dotnet/src/Devolutions.Pinget.Core.Tests/Devolutions.Pinget.Core.Tests.csproj -c Release --no-build

      - name: Run PowerShell tests
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File (Resolve-Path 'dotnet/tests/RunTests.ps1')

      - name: Pack NuGet packages
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -Path dist/nuget -ItemType Directory -Force | Out-Null
          $packArgs = @('-c', 'Release', '--no-build', '-p:ContinuousIntegrationBuild=true', "-p:Version=$env:PACKAGE_VERSION", '-p:IncludeSymbols=true', '-p:SymbolPackageFormat=snupkg', '-o', 'dist/nuget')
          dotnet pack dotnet/src/Devolutions.Pinget.Core/Devolutions.Pinget.Core.csproj @packArgs
          dotnet pack dotnet/src/Devolutions.Pinget.PowerShell.Engine/Devolutions.Pinget.PowerShell.Engine.csproj @packArgs
          dotnet pack dotnet/src/Devolutions.Pinget.PowerShell.Cmdlets/Devolutions.Pinget.PowerShell.Cmdlets.csproj @packArgs

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csharp-nuget
          path: |
            dist/nuget/*.nupkg
            dist/nuget/*.snupkg
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - rust-artifacts
      - csharp-packages
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/release/*.zip dist/release/*.nupkg dist/release/*.snupkg --generate-notes

  publish-nuget:
    name: Publish NuGet
    runs-on: ubuntu-latest
    needs:
      - prepare
      - csharp-packages
    if: github.event_name != 'workflow_dispatch' || inputs.publish_nuget

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: csharp-nuget
          path: dist/nuget

      - name: Push packages to NuGet.org
        if: env.NUGET_API_KEY != ''
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push dist/nuget/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dist/nuget/*.snupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate