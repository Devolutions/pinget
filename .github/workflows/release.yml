name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Package version to release. Defaults to the version detected from source files.
        required: false
        type: string
      dry_run:
        description: Build and package only; skip tag creation, GitHub release, and NuGet publication.
        required: false
        default: true
        type: boolean
      publish_nuget:
        description: Publish packages to NuGet.org during a manual release.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      dry_run: ${{ steps.inputs.outputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: inputs
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute package version
        id: version
        shell: bash
        run: |
          VERSION_INPUT='${{ inputs.version }}'
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          else
            CORE_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' rust/crates/pinget-core/Cargo.toml | head -n 1)
            CLI_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' rust/crates/pinget-cli/Cargo.toml | head -n 1)
            DOTNET_VERSION=$(sed -n 's/^const string Version = "\(.*\)";$/\1/p' dotnet/src/Devolutions.Pinget.Cli/Program.cs | head -n 1)
            if [ -z "$CORE_VERSION" ] || [ -z "$CLI_VERSION" ] || [ -z "$DOTNET_VERSION" ]; then
              echo "Unable to detect version from source files" >&2
              exit 1
            fi
            if [ "$CORE_VERSION" != "$CLI_VERSION" ] || [ "$CORE_VERSION" != "$DOTNET_VERSION" ]; then
              echo "Version mismatch detected: pinget-core=$CORE_VERSION pinget-cli=$CLI_VERSION dotnet=$DOTNET_VERSION" >&2
              exit 1
            fi
            VERSION="$CORE_VERSION"
          fi
          if [ -z "$VERSION" ]; then
            echo "Package version is empty" >&2
            exit 1
          fi
          if [ "${{ steps.inputs.outputs.dry_run }}" != "true" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Releases must run from the master branch; use dry_run=true for validation on other refs" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

  rust-artifacts:
    name: Rust Artifacts (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: pinget-windows-x64.zip
            binary_path: rust/target/release/pinget.exe
          - os: ubuntu-latest
            asset_name: pinget-linux-x64.zip
            binary_path: rust/target/release/pinget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust on Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Setup Rust on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: cargo build -p pinget-cli --manifest-path rust/Cargo.toml --release

      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          Compress-Archive -LiteralPath '${{ matrix.binary_path }}' -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Archive Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          zip -j "dist/${{ matrix.asset_name }}" "${{ matrix.binary_path }}"

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  csharp-packages:
    name: C# Packages
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Restore solution
        run: dotnet restore dotnet/Devolutions.Pinget.slnx

      - name: Build solution
        run: dotnet build dotnet/Devolutions.Pinget.slnx -c Release --no-restore

      - name: Run core tests
        run: dotnet test dotnet/src/Devolutions.Pinget.Core.Tests/Devolutions.Pinget.Core.Tests.csproj -c Release --no-build

      - name: Run PowerShell tests
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File (Resolve-Path 'dotnet/tests/RunTests.ps1')

      - name: Pack NuGet packages
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -Path dist/nuget -ItemType Directory -Force | Out-Null
          $packArgs = @('-c', 'Release', '--no-build', '-p:ContinuousIntegrationBuild=true', "-p:Version=$env:PACKAGE_VERSION", '-p:IncludeSymbols=true', '-p:SymbolPackageFormat=snupkg', '-o', 'dist/nuget')
          dotnet pack dotnet/src/Devolutions.Pinget.Core/Devolutions.Pinget.Core.csproj @packArgs
          dotnet pack dotnet/src/Devolutions.Pinget.PowerShell.Engine/Devolutions.Pinget.PowerShell.Engine.csproj @packArgs
          dotnet pack dotnet/src/Devolutions.Pinget.PowerShell.Cmdlets/Devolutions.Pinget.PowerShell.Cmdlets.csproj @packArgs

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csharp-nuget
          path: |
            dist/nuget/*.nupkg
            dist/nuget/*.snupkg
          if-no-files-found: error

  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs:
      - prepare
      - rust-artifacts
      - csharp-packages
    if: needs.prepare.outputs.dry_run != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ needs.prepare.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.prepare.outputs.tag_name }} already exists on origin" >&2
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag_name }}" "${GITHUB_SHA}" -m "Release ${{ needs.prepare.outputs.tag_name }}"
          git push origin "${{ needs.prepare.outputs.tag_name }}"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - create-tag
      - rust-artifacts
      - csharp-packages
    if: needs.prepare.outputs.dry_run != 'true'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag_name }}" dist/release/*.zip dist/release/*.nupkg dist/release/*.snupkg --generate-notes

  publish-nuget:
    name: Publish NuGet
    runs-on: ubuntu-latest
    needs:
      - prepare
      - csharp-packages
    if: needs.prepare.outputs.dry_run != 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_nuget)

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: csharp-nuget
          path: dist/nuget

      - name: Push packages to NuGet.org
        if: env.NUGET_API_KEY != ''
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push dist/nuget/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dist/nuget/*.snupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate